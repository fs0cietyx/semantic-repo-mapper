version: '3.8'

services:
  # Metadata and relational storage
  postgres:
    image: postgres:15-alpine
    container_name: visualizer_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codebase_visualizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Graph database for file and symbol dependencies
  neo4j:
    image: neo4j:5.12.0-community
    container_name: visualizer_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Semantic code embedding search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: visualizer_qdrant
    restart: always
    ports:
      - "6333:6333" # Web API
      - "6334:6334" # gRPC connection
    volumes:
      - qdrant_storage:/qdrant/storage

  # Task broker and caching layer
  redis:
    image: redis:7-alpine
    container_name: visualizer_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Web Application API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visualizer_api
    restart: always
    environment:
      API_ENV: production
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - redis
      - qdrant

  # Celery Background Ingestion Task Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visualizer_celery_worker
    command: celery -A backend.workers.celery_app:celery_app worker --loglevel=info
    restart: always
    environment:
      API_ENV: production
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
    # Enforce container CPU and Memory constraints for sandboxing
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    volumes:
      - repo_clones:/var/lib/visualizer/repos
    depends_on:
      - postgres
      - neo4j
      - redis
      - qdrant

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  redis_data:
  repo_clones:
